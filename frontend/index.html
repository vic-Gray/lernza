<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The first learn-to-earn platform on Stellar. Create quests, set milestones, reward learners with tokens."
    />
    <meta name="theme-color" content="#FACC15" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lernza — Learn. Earn. On-chain." />
    <meta
      property="og:description"
      content="The first learn-to-earn platform on Stellar. Create quests, set milestones, reward learners with tokens."
    />
    <meta property="og:image" content="https://lernza.com/og-image.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:url" content="https://lernza.com" />
    <meta property="og:site_name" content="Lernza" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lernza — Learn. Earn. On-chain." />
    <meta
      name="twitter:description"
      content="The first learn-to-earn platform on Stellar. Create quests, set milestones, reward learners with tokens."
    />
    <meta name="twitter:image" content="https://lernza.com/og-image.png" />

    <title>Lernza — Learn. Earn. On-chain.</title>

    <!-- Critical hero CSS inlined to unblock first paint (issue #925) -->
    <style>
      *,::before,::after{box-sizing:border-box}
      body{margin:0;background:#fff;color:#0a0a0a;font-family:Inter,system-ui,sans-serif}
      #root{min-height:100dvh}
      .hero-section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1.5rem;text-align:center;background:#FACC15}
      .hero-heading{font-size:clamp(2rem,6vw,4rem);font-weight:900;line-height:1.1;margin:0 0 1rem}
      .hero-sub{font-size:1.125rem;max-width:42ch;margin:0 auto 2rem}
      .hero-cta{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.75rem;font-weight:700;border:3px solid #0a0a0a;box-shadow:4px 4px 0 #0a0a0a;background:#0a0a0a;color:#FACC15;cursor:pointer;text-decoration:none}
    </style>

    <!-- Font preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload critical heading weight (700) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap&subset=latin"
    />
    <!-- Non-blocking stylesheet load -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap&subset=latin"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap&subset=latin"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
